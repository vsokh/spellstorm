<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Crawl - Cover Image Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0812;
    color: #ccbbee;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    min-height: 100vh;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 16px;
    color: #9966cc;
    letter-spacing: 2px;
  }
  #preview-canvas {
    border: 1px solid #2a1f3e;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(153, 102, 204, 0.15);
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
  }
  button {
    background: linear-gradient(135deg, #9966cc, #6633aa);
    color: #fff;
    border: none;
    padding: 12px 28px;
    font-size: 15px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(153, 102, 204, 0.4);
  }
  button:active { transform: translateY(0); }
  .info {
    margin-top: 12px;
    font-size: 13px;
    color: #665588;
  }
</style>
</head>
<body>

<h1>WIZARD CRAWL &mdash; Cover Image Generator</h1>
<canvas id="preview-canvas" width="1260" height="1000"></canvas>
<div class="controls">
  <button id="btn-download">Download PNG (630x500)</button>
</div>
<div class="info">Preview is 2x. Export saves at 630&times;500 for itch.io.</div>

<script>
(function() {
  "use strict";

  // === Constants ===
  const W = 630;
  const H = 500;
  const SCALE = 2; // preview scale

  const previewCanvas = document.getElementById("preview-canvas");
  const previewCtx = previewCanvas.getContext("2d");

  // Off-screen canvas at native resolution for export
  const exportCanvas = document.createElement("canvas");
  exportCanvas.width = W;
  exportCanvas.height = H;
  const exportCtx = exportCanvas.getContext("2d");

  // Wizard class orbs
  const ORBS = [
    { name: "Pyromancer",   color: "#ff6633", x: 0, y: 0 },
    { name: "Cryomancer",   color: "#44bbff", x: 0, y: 0 },
    { name: "Stormcaller",  color: "#bb66ff", x: 0, y: 0 },
    { name: "Necromancer",  color: "#55cc55", x: 0, y: 0 },
    { name: "Chronomancer", color: "#ffcc44", x: 0, y: 0 },
    { name: "Arcanist",     color: "#ff55aa", x: 0, y: 0 },
    { name: "Warlock",      color: "#8833aa", x: 0, y: 0 },
  ];

  // Position orbs in an arc
  const arcCenterX = W / 2;
  const arcCenterY = H * 0.72;
  const arcRadiusX = W * 0.34;
  const arcRadiusY = H * 0.13;
  for (let i = 0; i < ORBS.length; i++) {
    const t = (i / (ORBS.length - 1)) * Math.PI; // 0 to PI
    ORBS[i].x = arcCenterX - arcRadiusX * Math.cos(t);
    ORBS[i].y = arcCenterY - arcRadiusY * Math.sin(t);
  }

  // Floating motes (persistent random data)
  const MOTES = [];
  const MOTE_COLORS = ["#9966cc", "#44bbff", "#ffcc44", "#bb66ff", "#ff6633", "#55cc55", "#ff55aa"];
  for (let i = 0; i < 45; i++) {
    MOTES.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.8 + Math.random() * 2.2,
      color: MOTE_COLORS[Math.floor(Math.random() * MOTE_COLORS.length)],
      alpha: 0.15 + Math.random() * 0.35,
      phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.7,
      drift: (Math.random() - 0.5) * 0.3,
    });
  }

  // Sparks around orbs (persistent random data)
  const ORB_SPARKS = [];
  for (let oi = 0; oi < ORBS.length; oi++) {
    const sparks = [];
    const count = 8 + Math.floor(Math.random() * 6);
    for (let s = 0; s < count; s++) {
      sparks.push({
        angle: Math.random() * Math.PI * 2,
        dist: 14 + Math.random() * 22,
        r: 0.6 + Math.random() * 1.8,
        phase: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 1.5,
      });
    }
    ORB_SPARKS.push(sparks);
  }

  // Stone floor cracks (persistent random data)
  const CRACKS = [];
  for (let i = 0; i < 25; i++) {
    const sx = Math.random() * W;
    const sy = H * 0.35 + Math.random() * H * 0.6;
    const segs = [];
    let cx = sx, cy = sy;
    const segCount = 2 + Math.floor(Math.random() * 4);
    for (let s = 0; s < segCount; s++) {
      cx += (Math.random() - 0.5) * 30;
      cy += (Math.random() - 0.5) * 20;
      segs.push({ x: cx, y: cy });
    }
    CRACKS.push({ start: { x: sx, y: sy }, segs });
  }

  // Stone color variation tiles
  const TILES = [];
  const tileSize = 35;
  for (let tx = 0; tx < W; tx += tileSize) {
    for (let ty = Math.floor(H * 0.3); ty < H; ty += tileSize) {
      TILES.push({
        x: tx, y: ty,
        w: tileSize, h: tileSize,
        brightness: Math.random() * 0.04 - 0.02,
      });
    }
  }

  // === Draw functions ===

  function drawBackground(ctx) {
    // Main gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "#07050e");
    grad.addColorStop(0.4, "#0d0a16");
    grad.addColorStop(1, "#1a0f2e");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stone floor tiles (subtle color variation)
    for (const tile of TILES) {
      const b = tile.brightness;
      const r = Math.max(0, Math.min(255, Math.round(13 + b * 255)));
      const g = Math.max(0, Math.min(255, Math.round(10 + b * 255)));
      const bv = Math.max(0, Math.min(255, Math.round(22 + b * 255)));
      ctx.fillStyle = `rgba(${r}, ${g}, ${bv}, 0.3)`;
      ctx.fillRect(tile.x, tile.y, tile.w, tile.h);
    }

    // Stone grid lines
    ctx.strokeStyle = "rgba(60, 40, 80, 0.08)";
    ctx.lineWidth = 0.5;
    for (let x = 0; x < W; x += tileSize) {
      ctx.beginPath();
      ctx.moveTo(x, H * 0.3);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = Math.floor(H * 0.3); y < H; y += tileSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Cracks
    ctx.strokeStyle = "rgba(40, 25, 55, 0.2)";
    ctx.lineWidth = 0.7;
    for (const crack of CRACKS) {
      ctx.beginPath();
      ctx.moveTo(crack.start.x, crack.start.y);
      for (const seg of crack.segs) {
        ctx.lineTo(seg.x, seg.y);
      }
      ctx.stroke();
    }

    // Center radial glow
    const radGlow = ctx.createRadialGradient(W / 2, H * 0.55, 0, W / 2, H * 0.55, W * 0.5);
    radGlow.addColorStop(0, "rgba(153, 102, 204, 0.15)");
    radGlow.addColorStop(0.5, "rgba(153, 102, 204, 0.05)");
    radGlow.addColorStop(1, "rgba(153, 102, 204, 0)");
    ctx.fillStyle = radGlow;
    ctx.fillRect(0, 0, W, H);
  }

  function drawVignette(ctx) {
    // Radial vignette
    const vig = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.75);
    vig.addColorStop(0, "rgba(0,0,0,0)");
    vig.addColorStop(0.6, "rgba(0,0,0,0)");
    vig.addColorStop(1, "rgba(0,0,0,0.65)");
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // Extra darken at top and bottom edges
    const topGrad = ctx.createLinearGradient(0, 0, 0, H * 0.15);
    topGrad.addColorStop(0, "rgba(7,5,14,0.6)");
    topGrad.addColorStop(1, "rgba(7,5,14,0)");
    ctx.fillStyle = topGrad;
    ctx.fillRect(0, 0, W, H * 0.15);

    const botGrad = ctx.createLinearGradient(0, H * 0.88, 0, H);
    botGrad.addColorStop(0, "rgba(7,5,14,0)");
    botGrad.addColorStop(1, "rgba(7,5,14,0.5)");
    ctx.fillStyle = botGrad;
    ctx.fillRect(0, H * 0.88, W, H * 0.12);
  }

  function drawTitle(ctx) {
    // "WIZARD CRAWL" title
    const titleY = H * 0.2;
    const fontSize = 56;
    ctx.save();

    // Outer glow layers
    ctx.font = `bold ${fontSize}px Georgia, "Times New Roman", serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // Shadow glow
    ctx.shadowColor = "#9966cc";
    ctx.shadowBlur = 30;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;

    // First glow pass
    ctx.fillStyle = "rgba(153, 102, 204, 0.4)";
    ctx.fillText("WIZARD CRAWL", W / 2, titleY);

    // Second brighter pass
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#bb88ee";

    // Gradient fill
    const titleGrad = ctx.createLinearGradient(W / 2 - 180, titleY - 20, W / 2 + 180, titleY + 20);
    titleGrad.addColorStop(0, "#ff6633");
    titleGrad.addColorStop(0.45, "#ccaa44");
    titleGrad.addColorStop(1, "#9966cc");
    ctx.fillStyle = titleGrad;
    ctx.fillText("WIZARD CRAWL", W / 2, titleY);

    // Subtle stroke for definition
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 0.5;
    ctx.strokeText("WIZARD CRAWL", W / 2, titleY);

    ctx.restore();

    // Decorative line under title
    const lineY = titleY + 38;
    const lineW = 200;
    const lineGrad = ctx.createLinearGradient(W / 2 - lineW / 2, 0, W / 2 + lineW / 2, 0);
    lineGrad.addColorStop(0, "rgba(153,102,204,0)");
    lineGrad.addColorStop(0.3, "rgba(153,102,204,0.4)");
    lineGrad.addColorStop(0.5, "rgba(204,170,68,0.5)");
    lineGrad.addColorStop(0.7, "rgba(153,102,204,0.4)");
    lineGrad.addColorStop(1, "rgba(153,102,204,0)");
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(W / 2 - lineW / 2, lineY);
    ctx.lineTo(W / 2 + lineW / 2, lineY);
    ctx.stroke();

    // Small diamond at center of line
    ctx.fillStyle = "rgba(204,170,68,0.6)";
    ctx.save();
    ctx.translate(W / 2, lineY);
    ctx.rotate(Math.PI / 4);
    ctx.fillRect(-2.5, -2.5, 5, 5);
    ctx.restore();

    // Subtitle
    ctx.save();
    ctx.font = '16px Georgia, "Times New Roman", serif';
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "#9966cc";
    ctx.shadowBlur = 8;
    ctx.fillStyle = "#ccbbee";
    ctx.fillText("Co-op Roguelike Dungeon Crawler", W / 2, titleY + 56);
    ctx.restore();
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return { r, g, b };
  }

  function drawEnergyLines(ctx, time) {
    ctx.save();
    for (let i = 0; i < ORBS.length - 1; i++) {
      const a = ORBS[i];
      const b = ORBS[i + 1];

      // Curved line via quadratic bezier
      const midX = (a.x + b.x) / 2;
      const midY = (a.y + b.y) / 2 - 15 - Math.sin(time * 0.8 + i) * 4;

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.quadraticCurveTo(midX, midY, b.x, b.y);

      ctx.strokeStyle = "rgba(153, 102, 204, 0.12)";
      ctx.lineWidth = 1.2;
      ctx.stroke();

      // Thinner bright inner line
      ctx.strokeStyle = "rgba(200, 180, 255, 0.06)";
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Connect first and last with a wider arc
    const first = ORBS[0];
    const last = ORBS[ORBS.length - 1];
    const midX = (first.x + last.x) / 2;
    const midY = (first.y + last.y) / 2 - 40 - Math.sin(time * 0.5) * 5;
    ctx.beginPath();
    ctx.moveTo(first.x, first.y);
    ctx.quadraticCurveTo(midX, midY, last.x, last.y);
    ctx.strokeStyle = "rgba(153, 102, 204, 0.06)";
    ctx.lineWidth = 0.8;
    ctx.stroke();

    ctx.restore();
  }

  function drawOrbs(ctx, time) {
    for (let i = 0; i < ORBS.length; i++) {
      const orb = ORBS[i];
      const rgb = hexToRgb(orb.color);
      const pulse = 1 + Math.sin(time * 1.5 + i * 0.9) * 0.12;
      const baseR = 18 * pulse;

      ctx.save();

      // Outer glow
      const outerGlow = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, baseR * 2.5);
      outerGlow.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.25)`);
      outerGlow.addColorStop(0.4, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.1)`);
      outerGlow.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
      ctx.fillStyle = outerGlow;
      ctx.beginPath();
      ctx.arc(orb.x, orb.y, baseR * 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Mid layer
      const midGlow = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, baseR * 1.4);
      midGlow.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.6)`);
      midGlow.addColorStop(0.5, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.2)`);
      midGlow.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
      ctx.fillStyle = midGlow;
      ctx.beginPath();
      ctx.arc(orb.x, orb.y, baseR * 1.4, 0, Math.PI * 2);
      ctx.fill();

      // Bright core
      const coreGrad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, baseR * 0.6);
      coreGrad.addColorStop(0, `rgba(255, 255, 255, 0.9)`);
      coreGrad.addColorStop(0.3, `rgba(${Math.min(255, rgb.r + 80)}, ${Math.min(255, rgb.g + 80)}, ${Math.min(255, rgb.b + 80)}, 0.7)`);
      coreGrad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.4)`);
      ctx.fillStyle = coreGrad;
      ctx.beginPath();
      ctx.arc(orb.x, orb.y, baseR * 0.6, 0, Math.PI * 2);
      ctx.fill();

      // Sparks
      const sparks = ORB_SPARKS[i];
      for (const spark of sparks) {
        const sparkAngle = spark.angle + time * spark.speed * 0.3;
        const sparkDist = spark.dist + Math.sin(time * spark.speed + spark.phase) * 5;
        const sx = orb.x + Math.cos(sparkAngle) * sparkDist;
        const sy = orb.y + Math.sin(sparkAngle) * sparkDist;
        const sparkAlpha = 0.3 + Math.sin(time * spark.speed * 2 + spark.phase) * 0.25;

        ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${sparkAlpha})`;
        ctx.beginPath();
        ctx.arc(sx, sy, spark.r * pulse, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }
  }

  function drawMotes(ctx, time) {
    for (const mote of MOTES) {
      const y = mote.y + Math.sin(time * mote.speed + mote.phase) * 8;
      const x = mote.x + Math.cos(time * mote.speed * 0.7 + mote.phase) * 4 + mote.drift * time * 2;
      const flickerAlpha = mote.alpha * (0.6 + Math.sin(time * mote.speed * 3 + mote.phase) * 0.4);
      const rgb = hexToRgb(mote.color);

      // Tiny glow around mote
      ctx.save();
      ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${flickerAlpha * 0.3})`;
      ctx.beginPath();
      ctx.arc(((x % W) + W) % W, y, mote.r * 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${flickerAlpha})`;
      ctx.beginPath();
      ctx.arc(((x % W) + W) % W, y, mote.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawBottomText(ctx) {
    ctx.save();
    ctx.font = '12px Georgia, "Times New Roman", serif';
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#887799";
    ctx.fillText("14 Wizard Classes  \u2022  Wave Survival  \u2022  P2P Co-op", W / 2, H - 24);
    ctx.restore();
  }

  // Wizard silhouettes - simple stylized wizard shapes above the orbs
  function drawWizardSilhouettes(ctx) {
    ctx.save();
    for (let i = 0; i < ORBS.length; i++) {
      const orb = ORBS[i];
      const rgb = hexToRgb(orb.color);
      const silY = orb.y - 40;

      // Simple wizard silhouette: triangular robe + pointed hat
      ctx.fillStyle = `rgba(${Math.floor(rgb.r * 0.3)}, ${Math.floor(rgb.g * 0.3)}, ${Math.floor(rgb.b * 0.3)}, 0.35)`;

      // Robe (triangle)
      ctx.beginPath();
      ctx.moveTo(orb.x - 8, silY + 8);
      ctx.lineTo(orb.x + 8, silY + 8);
      ctx.lineTo(orb.x, silY - 6);
      ctx.closePath();
      ctx.fill();

      // Hat (smaller triangle on top)
      ctx.beginPath();
      ctx.moveTo(orb.x - 5, silY - 5);
      ctx.lineTo(orb.x + 5, silY - 5);
      ctx.lineTo(orb.x, silY - 18);
      ctx.closePath();
      ctx.fill();

      // Head (small circle)
      ctx.beginPath();
      ctx.arc(orb.x, silY - 3, 3.5, 0, Math.PI * 2);
      ctx.fill();

      // Subtle glow connecting wizard to orb
      const connGrad = ctx.createLinearGradient(orb.x, silY + 8, orb.x, orb.y);
      connGrad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.15)`);
      connGrad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
      ctx.strokeStyle = connGrad;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(orb.x, silY + 8);
      ctx.lineTo(orb.x, orb.y - 18);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Rune circle around the orb arrangement
  function drawRuneCircle(ctx, time) {
    ctx.save();
    const cx = W / 2;
    const cy = arcCenterY - 5;
    const rOuter = W * 0.4;
    const rInner = W * 0.38;

    // Rotating subtle circle
    ctx.strokeStyle = "rgba(153, 102, 204, 0.06)";
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(cx, cy, rOuter, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, cy, rInner, 0, Math.PI * 2);
    ctx.stroke();

    // Rune marks along the circle
    const runeCount = 24;
    for (let i = 0; i < runeCount; i++) {
      const angle = (i / runeCount) * Math.PI * 2 + time * 0.05;
      const rMid = (rOuter + rInner) / 2;
      const x = cx + Math.cos(angle) * rMid;
      const y = cy + Math.sin(angle) * rMid;

      // Only draw if within canvas bounds
      if (y > 0 && y < H && x > 0 && x < W) {
        const alpha = 0.08 + Math.sin(time * 0.8 + i) * 0.04;
        ctx.fillStyle = `rgba(153, 102, 204, ${alpha})`;

        // Alternate between small shapes
        if (i % 3 === 0) {
          // Dot
          ctx.beginPath();
          ctx.arc(x, y, 1.5, 0, Math.PI * 2);
          ctx.fill();
        } else if (i % 3 === 1) {
          // Tiny line segment
          const dx = Math.cos(angle) * 3;
          const dy = Math.sin(angle) * 3;
          ctx.strokeStyle = `rgba(153, 102, 204, ${alpha})`;
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(x - dx, y - dy);
          ctx.lineTo(x + dx, y + dy);
          ctx.stroke();
        } else {
          // Small diamond
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle);
          ctx.fillRect(-1.5, -1.5, 3, 3);
          ctx.restore();
        }
      }
    }

    ctx.restore();
  }

  // Main draw function
  function draw(ctx, time) {
    ctx.clearRect(0, 0, W, H);

    drawBackground(ctx);
    drawRuneCircle(ctx, time);
    drawEnergyLines(ctx, time);
    drawWizardSilhouettes(ctx);
    drawOrbs(ctx, time);
    drawMotes(ctx, time);
    drawVignette(ctx);
    drawTitle(ctx);
    drawBottomText(ctx);
  }

  // === Animation loop (preview) ===
  let startTime = null;
  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const time = (timestamp - startTime) / 1000;

    // Draw at 2x scale for preview
    previewCtx.save();
    previewCtx.scale(SCALE, SCALE);
    draw(previewCtx, time);
    previewCtx.restore();

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  // === Download ===
  document.getElementById("btn-download").addEventListener("click", function() {
    // Draw static frame at native resolution
    draw(exportCtx, 2.5); // fixed time for a nice static pose
    const link = document.createElement("a");
    link.download = "wizard-crawl-cover.png";
    link.href = exportCanvas.toDataURL("image/png");
    link.click();
  });

})();
</script>
</body>
</html>
