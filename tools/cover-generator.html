<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spellstorm - Cover Image Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0812;
    color: #ccbbee;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    min-height: 100vh;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 16px;
    color: #9966cc;
    letter-spacing: 2px;
  }
  #preview-canvas {
    border: 1px solid #2a1f3e;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(153, 102, 204, 0.15);
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
  }
  button {
    background: linear-gradient(135deg, #9966cc, #6633aa);
    color: #fff;
    border: none;
    padding: 12px 28px;
    font-size: 15px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(153, 102, 204, 0.4);
  }
  button:active { transform: translateY(0); }
  .info {
    margin-top: 12px;
    font-size: 13px;
    color: #665588;
  }
</style>
</head>
<body>

<h1>SPELLSTORM &mdash; Cover Image Generator</h1>
<canvas id="preview-canvas" width="1260" height="1000"></canvas>
<div class="controls">
  <button id="btn-download">Download PNG (630x500)</button>
</div>
<div class="info">Preview is 2x. Export saves at 630&times;500 for itch.io.</div>

<script>
(function() {
  "use strict";

  // === Constants ===
  const W = 630;
  const H = 500;
  const SCALE = 2;

  const previewCanvas = document.getElementById("preview-canvas");
  const previewCtx = previewCanvas.getContext("2d");

  const exportCanvas = document.createElement("canvas");
  exportCanvas.width = W;
  exportCanvas.height = H;
  const exportCtx = exportCanvas.getContext("2d");

  // === Seeded random for repeatable visuals ===
  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const rng = mulberry32(42);
  function rand(lo, hi) { return lo + rng() * (hi - lo); }
  function randInt(lo, hi) { return Math.floor(rand(lo, hi + 1)); }
  function pick(arr) { return arr[Math.floor(rng() * arr.length)]; }

  // === Class ability colors ===
  const CLASS_COLORS = [
    "#ff6633", // Fire (orange)
    "#44bbff", // Ice (blue)
    "#bb66ff", // Lightning (purple)
    "#55cc55", // Nature (green)
    "#ffcc44", // Holy/gold
    "#ff55aa", // Arcane (pink)
    "#8833aa", // Shadow (dark purple)
    "#aabbcc", // Steel (silver)
  ];

  // === Pre-generated random data ===

  // Stone tile data for floor
  const TILE_SIZE = 35;
  const floorTiles = [];
  for (let ty = 0; ty < Math.ceil(H * 0.55 / TILE_SIZE) + 1; ty++) {
    for (let tx = 0; tx < Math.ceil(W / TILE_SIZE) + 1; tx++) {
      floorTiles.push({
        x: tx * TILE_SIZE,
        y: H * 0.45 + ty * TILE_SIZE,
        shade: rand(-0.02, 0.02),
        hasCrack: rng() < 0.25,
        crackAngle: rand(0, Math.PI * 2),
        crackLen: rand(8, 22),
        crackOff: rand(-5, 5),
      });
    }
  }

  // Energy rays (10 rays)
  const NUM_RAYS = 10;
  const rays = [];
  for (let i = 0; i < NUM_RAYS; i++) {
    const angle = (Math.PI * 2 * i / NUM_RAYS) + rand(-0.2, 0.2);
    const length = rand(100, 200);
    const colorIdx = i % CLASS_COLORS.length;
    const particles = [];
    for (let p = 0; p < randInt(3, 5); p++) {
      particles.push({
        dist: rand(0.2, 0.95),
        lateralOff: rand(-12, 12),
        size: rand(1.5, 4),
        baseAlpha: rand(0.4, 0.8),
      });
    }
    rays.push({
      angle,
      length,
      color: CLASS_COLORS[colorIdx],
      baseWidth: rand(6, 10),
      tipWidth: rand(1, 2.5),
      particles,
    });
  }

  // Shockwave rings (3)
  const shockwaves = [];
  const shockRadii = [100, 160, 220];
  for (let i = 0; i < 3; i++) {
    const segments = [];
    const numSeg = randInt(8, 14);
    for (let s = 0; s < numSeg; s++) {
      segments.push({
        angleStart: (Math.PI * 2 * s / numSeg),
        angleEnd: (Math.PI * 2 * (s + 1) / numSeg),
        radiusOff: rand(-6, 6),
      });
    }
    shockwaves.push({
      baseRadius: shockRadii[i],
      segments,
      alpha: rand(0.08, 0.18),
    });
  }

  // Energy swirl arcs (6)
  const swirls = [];
  for (let i = 0; i < 6; i++) {
    swirls.push({
      baseAngle: rand(0, Math.PI * 2),
      radiusStart: rand(30, 60),
      radiusEnd: rand(130, 190),
      sweep: rand(0.8, 1.5),
      color: CLASS_COLORS[i % CLASS_COLORS.length],
      alpha: rand(0.08, 0.15),
      lineWidth: rand(1.5, 3),
    });
  }

  // Debris/sparks (60 particles)
  const debris = [];
  for (let i = 0; i < 60; i++) {
    const angle = rand(0, Math.PI * 2);
    const dist = rand(20, 240);
    debris.push({
      x: Math.cos(angle) * dist,
      y: Math.sin(angle) * dist,
      size: rand(1, 4),
      color: pick(CLASS_COLORS),
      alpha: rand(0.2, 0.6),
      isLine: rng() < 0.35,
      lineAngle: angle + rand(-0.3, 0.3),
      lineLen: rand(3, 8),
    });
  }

  // Enemy silhouettes
  const enemies = [];
  // Left side
  for (let i = 0; i < 4; i++) {
    enemies.push({
      x: rand(20, 80),
      y: rand(H * 0.35, H * 0.75),
      type: pick(["slime", "bat", "humanoid"]),
      size: rand(12, 25),
      rotation: rand(0.1, 0.4), // tilted away from center (to the left)
      alpha: rand(0.3, 0.55),
      glowColor: pick(CLASS_COLORS),
      side: "left",
    });
  }
  // Right side
  for (let i = 0; i < 4; i++) {
    enemies.push({
      x: rand(550, 610),
      y: rand(H * 0.35, H * 0.75),
      type: pick(["slime", "bat", "humanoid"]),
      size: rand(12, 25),
      rotation: rand(-0.4, -0.1), // tilted away from center (to the right)
      alpha: rand(0.3, 0.55),
      glowColor: pick(CLASS_COLORS),
      side: "right",
    });
  }

  // Floating motes (35 particles across full image)
  const motes = [];
  for (let i = 0; i < 35; i++) {
    motes.push({
      x: rand(10, W - 10),
      y: rand(10, H - 10),
      size: rand(0.8, 2.5),
      color: pick(CLASS_COLORS),
      baseAlpha: rand(0.2, 0.5),
      phaseX: rand(0, Math.PI * 2),
      phaseY: rand(0, Math.PI * 2),
      phaseA: rand(0, Math.PI * 2),
      freqX: rand(0.3, 0.8),
      freqY: rand(0.3, 0.8),
      freqA: rand(0.5, 1.5),
      ampX: rand(2, 6),
      ampY: rand(2, 6),
    });
  }

  // === Drawing functions ===

  function drawBackground(ctx) {
    // Dark dungeon gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "#07050e");
    grad.addColorStop(0.45, "#0d0a16");
    grad.addColorStop(1, "#1a0f2e");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawStoneFloor(ctx) {
    ctx.save();
    // Base floor tone
    const floorGrad = ctx.createLinearGradient(0, H * 0.45, 0, H);
    floorGrad.addColorStop(0, "rgba(18,12,30,0)");
    floorGrad.addColorStop(0.15, "rgba(18,12,30,0.3)");
    floorGrad.addColorStop(1, "rgba(22,15,35,0.5)");
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, H * 0.45, W, H * 0.55);

    // Tile grid lines
    ctx.strokeStyle = "rgba(40,30,55,0.25)";
    ctx.lineWidth = 0.5;
    const floorTop = H * 0.45;
    // Horizontal lines
    for (let y = floorTop; y <= H; y += TILE_SIZE) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
    // Vertical lines
    for (let x = 0; x <= W; x += TILE_SIZE) {
      ctx.beginPath();
      ctx.moveTo(x, floorTop);
      ctx.lineTo(x, H);
      ctx.stroke();
    }

    // Per-tile shade variation and cracks
    for (const tile of floorTiles) {
      if (tile.shade !== 0) {
        const alpha = Math.abs(tile.shade);
        ctx.fillStyle = tile.shade > 0
          ? `rgba(50,40,70,${alpha})`
          : `rgba(5,3,10,${alpha})`;
        ctx.fillRect(tile.x + 1, tile.y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
      }
      if (tile.hasCrack) {
        ctx.save();
        ctx.strokeStyle = "rgba(10,6,18,0.3)";
        ctx.lineWidth = 0.7;
        const cx = tile.x + TILE_SIZE / 2 + tile.crackOff;
        const cy = tile.y + TILE_SIZE / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(
          cx + Math.cos(tile.crackAngle) * tile.crackLen,
          cy + Math.sin(tile.crackAngle) * tile.crackLen
        );
        ctx.stroke();
        ctx.restore();
      }
    }
    ctx.restore();
  }

  function drawCoreGlow(ctx, cx, cy, t) {
    // Pulsing brightness
    const pulse = 1 + 0.12 * Math.sin(t * 1.8);

    // Large warm purple glow
    const outerGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
    outerGlow.addColorStop(0, `rgba(153,102,204,${0.2 * pulse})`);
    outerGlow.addColorStop(0.5, `rgba(153,102,204,${0.08 * pulse})`);
    outerGlow.addColorStop(1, "rgba(153,102,204,0)");
    ctx.fillStyle = outerGlow;
    ctx.fillRect(cx - 100, cy - 100, 200, 200);

    // Very large diffuse glow to light the scene
    const megaGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 250);
    megaGlow.addColorStop(0, `rgba(200,170,100,${0.06 * pulse})`);
    megaGlow.addColorStop(0.4, `rgba(153,102,204,${0.03 * pulse})`);
    megaGlow.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = megaGlow;
    ctx.fillRect(cx - 260, cy - 260, 520, 520);

    // White-hot center
    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 15);
    coreGrad.addColorStop(0, `rgba(255,255,240,${0.95 * pulse})`);
    coreGrad.addColorStop(0.4, `rgba(255,230,180,${0.7 * pulse})`);
    coreGrad.addColorStop(0.7, `rgba(204,170,68,${0.4 * pulse})`);
    coreGrad.addColorStop(1, "rgba(204,170,68,0)");
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawRays(ctx, cx, cy, t) {
    for (const ray of rays) {
      ctx.save();
      const cos = Math.cos(ray.angle);
      const sin = Math.sin(ray.angle);

      // Draw tapered beam as filled shape
      const halfBase = ray.baseWidth / 2;
      const halfTip = ray.tipWidth / 2;
      const len = ray.length;

      // Perpendicular direction
      const px = -sin;
      const py = cos;

      const x0l = cx + px * halfBase;
      const y0l = cy + py * halfBase;
      const x0r = cx - px * halfBase;
      const y0r = cy - py * halfBase;
      const x1l = cx + cos * len + px * halfTip;
      const y1l = cy + sin * len + py * halfTip;
      const x1r = cx + cos * len - px * halfTip;
      const y1r = cy + sin * len - py * halfTip;

      // Glow
      ctx.shadowColor = ray.color;
      ctx.shadowBlur = 18;

      // Gradient along beam
      const beamGrad = ctx.createLinearGradient(cx, cy, cx + cos * len, cy + sin * len);
      beamGrad.addColorStop(0, ray.color);
      beamGrad.addColorStop(0.7, ray.color + "88");
      beamGrad.addColorStop(1, ray.color + "00");

      ctx.fillStyle = beamGrad;
      ctx.beginPath();
      ctx.moveTo(x0l, y0l);
      ctx.lineTo(x1l, y1l);
      ctx.lineTo(x1r, y1r);
      ctx.lineTo(x0r, y0r);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;

      // Particles along ray
      for (const p of ray.particles) {
        const drift = p.dist + 0.02 * Math.sin(t * 0.5 + p.dist * 10);
        const d = drift * len;
        const lx = cx + cos * d + p.lateralOff * px;
        const ly = cy + sin * d + p.lateralOff * py;
        ctx.fillStyle = ray.color;
        ctx.globalAlpha = p.baseAlpha;
        ctx.beginPath();
        ctx.arc(lx, ly, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  function drawShockwaves(ctx, cx, cy, t) {
    for (const sw of shockwaves) {
      ctx.save();
      ctx.strokeStyle = "rgba(200,180,255," + sw.alpha + ")";
      ctx.lineWidth = 1.2;
      const pulseDelta = 5 * Math.sin(t * 0.6 + sw.baseRadius * 0.01);
      ctx.beginPath();
      for (const seg of sw.segments) {
        const r = sw.baseRadius + seg.radiusOff + pulseDelta;
        ctx.arc(cx, cy, Math.max(1, r), seg.angleStart, seg.angleEnd);
      }
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawSwirls(ctx, cx, cy, t) {
    for (const sw of swirls) {
      ctx.save();
      const a = sw.baseAngle + t * 0.05;
      ctx.strokeStyle = sw.color;
      ctx.globalAlpha = sw.alpha;
      ctx.lineWidth = sw.lineWidth;
      ctx.lineCap = "round";

      // Draw spiral as quadratic bezier
      const startR = sw.radiusStart;
      const endR = sw.radiusEnd;
      const midR = (startR + endR) * 0.55;
      const midAngle = a + sw.sweep * 0.5;

      const x0 = cx + Math.cos(a) * startR;
      const y0 = cy + Math.sin(a) * startR;
      const xc = cx + Math.cos(midAngle) * midR * 1.3;
      const yc = cy + Math.sin(midAngle) * midR * 1.3;
      const x1 = cx + Math.cos(a + sw.sweep) * endR;
      const y1 = cy + Math.sin(a + sw.sweep) * endR;

      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.quadraticCurveTo(xc, yc, x1, y1);
      ctx.stroke();

      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  function drawDebris(ctx, cx, cy) {
    for (const d of debris) {
      ctx.save();
      ctx.globalAlpha = d.alpha;
      ctx.fillStyle = d.color;
      ctx.strokeStyle = d.color;
      const px = cx + d.x;
      const py = cy + d.y;
      if (d.isLine) {
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(
          px + Math.cos(d.lineAngle) * d.lineLen,
          py + Math.sin(d.lineAngle) * d.lineLen
        );
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(px, py, d.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  function drawEnemySilhouette(ctx, e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.rotation);
    ctx.globalAlpha = e.alpha;

    // Faint glow behind the enemy from nearest spell color
    ctx.shadowColor = e.glowColor;
    ctx.shadowBlur = 12;

    const col = "rgba(30,20,40,0.9)";
    ctx.fillStyle = col;

    const s = e.size;
    if (e.type === "slime") {
      // Simple oval blob
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.6, s * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === "bat") {
      // Oval body + two triangle wings
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.25, s * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Left wing
      ctx.beginPath();
      ctx.moveTo(-s * 0.2, -s * 0.05);
      ctx.lineTo(-s * 0.55, -s * 0.35);
      ctx.lineTo(-s * 0.1, s * 0.1);
      ctx.closePath();
      ctx.fill();
      // Right wing
      ctx.beginPath();
      ctx.moveTo(s * 0.2, -s * 0.05);
      ctx.lineTo(s * 0.55, -s * 0.35);
      ctx.lineTo(s * 0.1, s * 0.1);
      ctx.closePath();
      ctx.fill();
    } else {
      // Humanoid: rectangle body + circle head
      ctx.beginPath();
      ctx.arc(0, -s * 0.35, s * 0.18, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(-s * 0.15, -s * 0.2, s * 0.3, s * 0.45);
    }

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawEnemies(ctx) {
    for (const e of enemies) {
      drawEnemySilhouette(ctx, e);
    }
  }

  function drawTitle(ctx) {
    ctx.save();
    const titleY = 70;

    // Title text
    ctx.font = "bold 56px Georgia, 'Times New Roman', serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // Outer glow
    ctx.shadowColor = "#9966cc";
    ctx.shadowBlur = 30;

    // Gradient fill
    const tGrad = ctx.createLinearGradient(W / 2 - 140, titleY, W / 2 + 140, titleY);
    tGrad.addColorStop(0, "#ff6633");
    tGrad.addColorStop(0.45, "#ccaa44");
    tGrad.addColorStop(1, "#9966cc");
    ctx.fillStyle = tGrad;
    ctx.fillText("SPELLSTORM", W / 2, titleY);

    // Second pass for stronger glow
    ctx.shadowBlur = 15;
    ctx.fillText("SPELLSTORM", W / 2, titleY);
    ctx.shadowBlur = 0;

    // Decorative line below title
    const lineY = titleY + 38;
    const lineW = 200;
    const lineGrad = ctx.createLinearGradient(W / 2 - lineW / 2, lineY, W / 2 + lineW / 2, lineY);
    lineGrad.addColorStop(0, "rgba(153,102,204,0)");
    lineGrad.addColorStop(0.25, "rgba(153,102,204,0.6)");
    lineGrad.addColorStop(0.5, "rgba(204,170,68,0.8)");
    lineGrad.addColorStop(0.75, "rgba(153,102,204,0.6)");
    lineGrad.addColorStop(1, "rgba(153,102,204,0)");
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(W / 2 - lineW / 2, lineY);
    ctx.lineTo(W / 2 + lineW / 2, lineY);
    ctx.stroke();

    // Diamond ornament at center of line
    const ds = 4;
    ctx.fillStyle = "#ccaa44";
    ctx.shadowColor = "#ccaa44";
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(W / 2, lineY - ds);
    ctx.lineTo(W / 2 + ds, lineY);
    ctx.lineTo(W / 2, lineY + ds);
    ctx.lineTo(W / 2 - ds, lineY);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.font = "16px Georgia, 'Times New Roman', serif";
    ctx.fillStyle = "#ccbbee";
    ctx.shadowColor = "#9966cc";
    ctx.shadowBlur = 8;
    ctx.fillText("Co-op Roguelike Wave Survival", W / 2, lineY + 22);
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  function drawMotes(ctx, t) {
    for (const m of motes) {
      const dx = Math.sin(t * m.freqX + m.phaseX) * m.ampX;
      const dy = Math.sin(t * m.freqY + m.phaseY) * m.ampY;
      const alpha = m.baseAlpha * (0.5 + 0.5 * Math.sin(t * m.freqA + m.phaseA));
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.fillStyle = m.color;
      ctx.beginPath();
      ctx.arc(m.x + dx, m.y + dy, m.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  function drawVignette(ctx) {
    // Radial vignette
    const cx = W / 2;
    const cy = H / 2;
    const maxR = Math.sqrt(cx * cx + cy * cy);
    const vig = ctx.createRadialGradient(cx, cy, maxR * 0.3, cx, cy, maxR);
    vig.addColorStop(0, "rgba(0,0,0,0)");
    vig.addColorStop(0.6, "rgba(0,0,0,0.15)");
    vig.addColorStop(1, "rgba(0,0,0,0.65)");
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // Extra top darkening for title readability
    const topGrad = ctx.createLinearGradient(0, 0, 0, 120);
    topGrad.addColorStop(0, "rgba(0,0,0,0.4)");
    topGrad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = topGrad;
    ctx.fillRect(0, 0, W, 120);

    // Extra bottom darkening
    const botGrad = ctx.createLinearGradient(0, H - 60, 0, H);
    botGrad.addColorStop(0, "rgba(0,0,0,0)");
    botGrad.addColorStop(1, "rgba(0,0,0,0.5)");
    ctx.fillStyle = botGrad;
    ctx.fillRect(0, H - 60, W, 60);
  }

  function drawBottomText(ctx) {
    ctx.save();
    ctx.font = "12px Georgia, 'Times New Roman', serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#887799";
    ctx.fillText("14 Classes  \u2022  Wave Survival  \u2022  P2P Co-op", W / 2, H - 18);
    ctx.restore();
  }

  // === Main draw ===

  function draw(ctx, t) {
    const cx = W / 2;
    const cy = H * 0.55;

    // 1. Background
    drawBackground(ctx);

    // 2. Stone floor
    drawStoneFloor(ctx);

    // 3. Enemy silhouettes (behind explosion so they're partly occluded)
    drawEnemies(ctx);

    // 4. The Spellstorm
    drawShockwaves(ctx, cx, cy, t);
    drawSwirls(ctx, cx, cy, t);
    drawDebris(ctx, cx, cy);
    drawRays(ctx, cx, cy, t);
    drawCoreGlow(ctx, cx, cy, t);

    // 5. Floating motes
    drawMotes(ctx, t);

    // 6. Vignette
    drawVignette(ctx);

    // 7. Title
    drawTitle(ctx);

    // 8. Bottom text
    drawBottomText(ctx);
  }

  // === Animation loop (preview) ===

  let startTime = null;

  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const t = (timestamp - startTime) / 1000;

    previewCtx.save();
    previewCtx.scale(SCALE, SCALE);
    draw(previewCtx, t);
    previewCtx.restore();

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  // === Download (static at t=2.5) ===

  document.getElementById("btn-download").addEventListener("click", function() {
    draw(exportCtx, 2.5);
    const link = document.createElement("a");
    link.download = "spellstorm-cover.png";
    link.href = exportCanvas.toDataURL("image/png");
    link.click();
  });

})();
</script>
</body>
</html>
